name: Archive Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
    - cron: "43 2 * * *"

permissions:
  contents: write

jobs:
  ingest-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest incremental
        if: github.event_name != 'schedule' || github.event.schedule == '17 */3 * * *'
        run: npm run ingest

      - name: Ingest full verification
        if: github.event_name == 'schedule' && github.event.schedule == '43 2 * * *'
        run: npm run ingest:full

      - name: Commit generated data
        run: |
          if [[ -n "$(git status --porcelain data/generated)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/generated
            git commit -m "chore: refresh generated archive data"
            git push
          fi

      - name: Verify
        run: npm run verify

      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.PUBLIC_SITE_URL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        run: npm run deploy
